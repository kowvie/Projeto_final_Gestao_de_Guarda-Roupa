{% extends 'base.html' %}

{% block content %}
<h2>Categorias</h2>
<a href="/categorias/criar/" class="btn btn-primary mb-3">Nova Categoria</a>

<div class="card p-3 shadow-sm mb-3">
    <ul class="list-group list-group-flush">
        {% for c in categorias %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ c.nome }}</span>
                <span>
                    <a href="/categorias/editar/{{ c.id }}/" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/categorias/apagar/{{ c.id }}/" class="btn btn-danger btn-sm">Apagar</a>
                </span>
            </li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
