{% extends 'base.html' %}

{% block content %}
<h2>Apagar Categoria</h2>

<div class="card p-3 shadow-sm">
    <p>Tens a certeza que queres apagar a categoria "<strong>{{ categoria.nome }}</strong>"?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Sim, apagar</button>
        <a href="{% url 'lista_categorias' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
