{% extends 'base.html' %}

{% block content %}
<h2>Peças</h2>
<a href="{% url 'criar_peca' %}" class="btn btn-primary mb-3">Nova Peça</a>

<div class="card p-3 shadow-sm mb-3">
    <ul class="list-group list-group-flush">
        {% for p in pecas %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                    {{ p.nome }} - {{ p.categoria }} - {{ p.estacao }}
                    <small class="text-muted">(Usada {{ p.frequencia_uso }} vezes)</small>
                </span>
                <span>
                    <a href="/pecas/editar/{{ p.id }}/" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/pecas/apagar/{{ p.id }}/" class="btn btn-danger btn-sm">Apagar</a>
                    <a href="/pecas/usar/{{ p.id }}/" class="btn btn-success btn-sm">Usar</a>
                </span>
            </li>
        {% endfor %}
    </ul>
</div>
<h3>Filtrar</h3>
<div class="card p-3 shadow-sm">
    <form method="GET" class="row g-2 align-items-end">
        {% csrf_token %}
        <div class="col-md-4">
            Categoria:
            <select name="categoria" class="form-select">
                <option value="">Todas</option>
                {% for c in categorias %}
                    <option value="{{ c.id }}">{{ c.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            Estação:
            <select name="estacao" class="form-select">
                <option value="">Todas</option>
                {% for e in estacoes %}
                    <option value="{{ e.id }}">{{ e.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>
</div>

<hr>

{% endblock %}
