{% extends 'base.html' %}

{% block content %}
<h2>Criar Outfit</h2>

<div class="card p-4 shadow-sm">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-2">
            Nome: <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="mb-2">
            <h3>Selecionar Peças</h3>
            <div class="form-check">
                {% for p in pecas %}
                    <input type="checkbox" name="pecas" value="{{ p.id }}" class="form-check-input">
                    <label class="form-check-label">{{ p.nome }} ({{ p.categoria }})</label><br>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'lista_outfits' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
